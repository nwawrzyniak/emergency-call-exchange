<form id="loginForm">
  <div class="form-group">
    <label for="loginEmail">Email</label>
    <input type="email" id="loginEmail" title="Email address" placeholder="you@example.com" required>
  </div>
  <div class="form-group">
    <label for="loginPassword">Password</label>
    <input type="password" id="loginPassword" title="Password" placeholder="Your password" required>
  </div>
  <button type="submit" class="btn btn-primary btn-full">Login</button>
</form>

<div id="profileSection" class="hidden">
  <div class="card">
    <h2 class="section-heading">My Profile</h2>
    <div id="profileAlert"></div>
    <form id="profileForm">
      <div class="form-group">
        <label>Username</label>
        <label id="profileUserName" title="User name"></label>
      </div>
      <div class="form-group">
        <label for="profilePhone">Phone Number</label>
        <input type="tel" id="profilePhone" title="Phone number" placeholder="+1 234 567 8900" required>
      </div>
      <div class="form-group">
        <label for="profileDateOfBirth">Date of Birth</label>
        <input type="date" id="profileDateOfBirth" title="Date of birth (must be 18 or older)" required>
      </div>
      <div class="form-group">
        <label>Email: </label>
        <label id="profileEmail" title="Email address"></label>
      </div>
      <div class="form-group">
        <label>Gender: </label>
        <label id="profileGender" title="Gender"></label>
      </div>
      <div class="form-group">
        <label>Role: </label>
        <label id="profileRole" title="Account role"></label>
      </div>
      <button type="submit" class="btn btn-primary">Update Profile</button>
    </form>
  </div>
</div>

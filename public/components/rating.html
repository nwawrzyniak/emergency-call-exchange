<div id="ratingModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Rate Your Call</h2>
      <button class="close-btn" onclick="closeRatingModal()" type="button">&times;</button>
    </div>
    <div class="rating-modal-body">
      <p class="rating-prompt">How was your experience?</p>
      <div class="rating-stars" id="ratingStars">
        <span class="star" onclick="setRating(1)">★</span>
        <span class="star" onclick="setRating(2)">★</span>
        <span class="star" onclick="setRating(3)">★</span>
        <span class="star" onclick="setRating(4)">★</span>
        <span class="star" onclick="setRating(5)">★</span>
      </div>
      <div class="form-group">
        <label for="ratingFeedback">Feedback (optional)</label>
        <textarea id="ratingFeedback" title="Optional feedback about your call experience" placeholder="Share your experience..." rows="3" maxlength="500"></textarea>
      </div>
      <button class="btn btn-primary" onclick="submitRating()" type="submit">Submit Rating</button>
    </div>
  </div>
</div>

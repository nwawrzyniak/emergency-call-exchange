<form id="registerForm" class="hidden">
  <div class="form-group">
    <label for="regUserName">Username</label>
    <input type="text" id="regUserName" title="Username" placeholder="Username" required>
  </div>
  <div class="form-group">
    <label for="regEmail">Email</label>
    <input type="email" id="regEmail" title="Email address" placeholder="you@example.com" required>
  </div>
  <div class="form-group">
    <label for="regPassword">Password</label>
    <input type="password" id="regPassword" title="Password (minimum 6 characters)" placeholder="Minimum 6 characters" required minlength="6">
  </div>
  <div class="grid">
    <div class="form-group">
      <label for="regFirstName">First Name</label>
      <input type="text" id="regFirstName" title="First name" placeholder="First name" required>
    </div>
    <div class="form-group">
      <label for="regLastName">Last Name</label>
      <input type="text" id="regLastName" title="Last name" placeholder="Last name" required>
    </div>
  </div>
  <div class="form-group">
    <label for="regPhone">Phone Number</label>
    <input type="tel" id="regPhone" title="Phone number" placeholder="+1 234 567 8900" required>
  </div>
  <div class="grid">
    <div class="form-group">
      <label for="regDateOfBirth">Date of Birth</label>
      <input type="date" id="regDateOfBirth" title="Date of birth (must be 18 or older)" required>
    </div>
    <div class="form-group">
      <label for="regGender">Gender</label>
      <select id="regGender" title="Gender" required>
        <option value="">Select...</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="non-binary">Non-binary</option>
        <option value="other">Other</option>
      </select>
    </div>
  </div>
  <button type="submit" class="btn btn-primary btn-full">Register</button>
</form>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Call Exchange</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <!-- Auth Container -->
  <div id="authContainer" class="auth-container">
    <div class="card">
      <!-- Auth Component -->
      <div data-component="components/auth.html"></div>

      <!-- Login Form -->
      <div data-component="components/login.html"></div>

      <!-- Register Form -->
      <div data-component="components/register.html"></div>
    </div>
  </div>

  <!-- Main App Container -->
  <div id="appContainer" class="container hidden">
    <!-- Header Component -->
    <div data-component="components/header.html"></div>

    <!-- Dashboard Section -->
    <div data-component="components/dashboard.html"></div>

    <!-- My Requests Section -->
    <div data-component="components/my-requests.html"></div>

    <!-- Available Calls Section -->
    <div data-component="components/available-calls.html"></div>

    <!-- Profile Section -->
    <div data-component="components/profile.html"></div>
  </div>

  <!-- Rating Modal -->
  <div data-component="components/rating.html"></div>
  <script src="index.js"></script>

</html>
